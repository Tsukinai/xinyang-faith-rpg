<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>信仰 Faith · 亚特兰大陆 WAP RPG</title>
<link rel="stylesheet" href="styles.css" id="main-css">
</head>
<body>
<div id="app">
  <!-- 顶部状态条 -->
  <header id="topbar" class="hidden">
    <div class="hero-line">
      <span id="hero-name">英雄</span>
      <span id="hero-class" class="tag"></span>
      <span id="hero-lv">Lv.1</span>
    </div>
    <div class="bars">
      <div class="bar hp"><div id="hp-fill" class="fill"></div><span id="hp-text">0/0</span></div>
      <div class="bar mp"><div id="mp-fill" class="fill"></div><span id="mp-text">0/0</span></div>
      <div class="bar xp"><div id="xp-fill" class="fill"></div><span id="xp-text">0/0</span></div>
    </div>
    <div class="resources">
      <span>金币 <b id="gold">0</b></span>
      <span>信用点 <b id="diamond">0</b></span>
      <span>威望 <b id="honor">0</b></span>
      <span id="point-badge" class="hidden">可用属性点 <b id="free-points">0</b></span>
    </div>
  </header>

  <!-- 主内容区 -->
  <main id="screen"></main>

  <!-- 底部导航 -->
  <nav id="navbar" class="hidden">
    <button data-nav="quest">任务</button>
    <button data-nav="map">地图</button>
    <button data-nav="hero">角色</button>
    <button data-nav="bag">背包</button>
    <button data-nav="skill">技能</button>
    <button data-nav="pet">宠物</button>
    <button data-nav="town">城镇</button>
    <button data-nav="sys">系统</button>
  </nav>
</div>

<div id="toast-wrap"></div>

<!-- 动态按序加载脚本,带时间戳防缓存(避免改了代码不生效) -->
<script>
(function(){
  var v = Date.now();
  // 同步刷新样式表,避免旧CSS缓存
  var css = document.getElementById("main-css");
  if(css) css.href = "styles.css?v=" + v;
  var files = ["data.js","engine.js","ui.js","main.js"];
  (function next(i){
    if(i >= files.length) return;
    var s = document.createElement("script");
    s.src = files[i] + "?v=" + v;
    s.onload = function(){ next(i+1); };
    s.onerror = function(){ console.error("加载失败:", files[i]); };
    document.body.appendChild(s);
  })(0);
})();
</script>
</body>
</html>
